<style>
    :root {
        --bg: #0a1628;
        --surface: #0d1b35;
        --surface2: #111f3e;
        --border: #1a2d52;
        --border2: #1f3660;
        --gold: #c9a84c;
        --gold-light: #e8c96a;
        --gold-dim: rgba(201,168,76,0.12);
        --text: #e8edf5;
        --text-muted: #6b7a99;
        --text-soft: #9aa3bc;
        --green: #4ade80;
    }

    .app-layout { display: flex; flex: 1; position: relative; z-index: 1; }

    .sidebar {
        width: 230px; flex-shrink: 0;
        background: var(--surface);
        border-right: 1px solid var(--border);
        position: fixed; top: 62px; left: 0;
        height: calc(100vh - 62px);
        overflow-y: auto; z-index: 50;
        scrollbar-width: none;
        display: flex; flex-direction: column;
    }
    .sidebar::-webkit-scrollbar { display: none; }

    .sidebar-user {
        padding: 20px 16px 16px;
        border-bottom: 1px solid var(--border);
        display: flex; align-items: center; gap: 12px;
    }
    .sidebar-avatar {
        width: 38px; height: 38px; flex-shrink: 0;
        background: linear-gradient(135deg, var(--gold-dim), rgba(201,168,76,0.25));
        border: 1px solid rgba(201,168,76,0.3);
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    .sidebar-user-info { overflow: hidden; }
    .sidebar-username { font-size: 0.82rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-role { font-size: 0.68rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px; margin-top: 2px; }
    .sidebar-role-dot { width: 5px; height: 5px; background: var(--green); border-radius: 50%; }

    .sidebar-nav { padding: 12px 10px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .sidebar-section { font-size: 0.62rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; padding: 10px 8px 6px; }
    .sidebar-section:first-child { padding-top: 2px; }

    .sidebar-link {
        display: flex; align-items: center; gap: 10px;
        padding: 8px 10px; border-radius: 8px;
        font-size: 0.82rem; color: var(--text-soft);
        text-decoration: none; transition: all 0.18s; font-weight: 500;
        position: relative;
    }
    .sidebar-link:hover { background: var(--surface2); color: var(--text); }
    .sidebar-link.active {
        background: var(--gold-dim);
        color: var(--gold);
        border: 1px solid rgba(201,168,76,0.18);
    }
    .sidebar-link.active::before {
        content: '';
        position: absolute; left: 0; top: 50%; transform: translateY(-50%);
        width: 3px; height: 60%; background: var(--gold);
        border-radius: 0 3px 3px 0;
    }
    .sidebar-icon { font-size: 0.95rem; width: 20px; text-align: center; flex-shrink: 0; }
    .sidebar-link-text { flex: 1; }

    .cart-badge {
        min-width: 18px; height: 18px;
        background: var(--gold); color: #070e1a;
        font-size: 0.62rem; font-weight: 700;
        border-radius: 100px; display: flex;
        align-items: center; justify-content: center;
        padding: 0 5px;
    }

    .sidebar-divider { height: 1px; background: var(--border); margin: 6px 10px; }

    .genre-pill {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 10px; border-radius: 7px;
        font-size: 0.8rem; color: var(--text-muted);
        text-decoration: none; transition: all 0.18s;
    }
    .genre-pill::before {
        content: ''; width: 5px; height: 5px;
        border-radius: 50%; background: var(--border2);
        flex-shrink: 0; transition: background 0.18s;
    }
    .genre-pill:hover { background: var(--surface2); color: var(--text); }
    .genre-pill:hover::before { background: var(--text-soft); }
    .genre-pill.active { color: var(--gold); font-weight: 600; }
    .genre-pill.active::before { background: var(--gold); }

    .app-main { flex: 1; margin-left: 230px; min-height: calc(100vh - 62px); }

    @media (max-width: 900px) {
        .sidebar { display: none; }
        .app-main { margin-left: 0; }
    }
</style>

<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-user">
            <div class="sidebar-avatar">👤</div>
            <div class="sidebar-user-info">
                <div class="sidebar-username">{{ username }}</div>
                <div class="sidebar-role">
                    <div class="sidebar-role-dot"></div>
                    Active Member
                </div>
            </div>
        </div>
        <div class="sidebar-nav">
            <div class="sidebar-section">Browse</div>
            <a href="/dashboard" class="sidebar-link {{ 'active' if active_page == 'dashboard' }}">
                <span class="sidebar-icon">📚</span>
                <span class="sidebar-link-text">All Books</span>
            </a>
            <a href="/orders" class="sidebar-link {{ 'active' if active_page == 'orders' }}">
                <span class="sidebar-icon">📦</span>
                <span class="sidebar-link-text">My Orders</span>
            </a>
            <div class="sidebar-section">Cart</div>
            <a href="/cart" class="sidebar-link {{ 'active' if active_page == 'cart' }}">
                <span class="sidebar-icon">🛒</span>
                <span class="sidebar-link-text">My Cart</span>
                {% if cart_count and cart_count > 0 %}<span class="cart-badge">{{ cart_count }}</span>{% endif %}
            </a>
            <div class="sidebar-section">Account</div>
            <a href="/profile" class="sidebar-link {{ 'active' if active_page == 'profile' }}">
                <span class="sidebar-icon">👤</span>
                <span class="sidebar-link-text">My Profile</span>
            </a>
            {% if genres %}
            <div class="sidebar-divider"></div>
            <div class="sidebar-section">Genres</div>
            <a href="/dashboard" class="genre-pill {{ 'active' if not selected_genre }}">All Genres</a>
            {% for genre in genres %}
            <a href="/dashboard?genre={{ genre }}" class="genre-pill {{ 'active' if selected_genre == genre }}">{{ genre }}</a>
            {% endfor %}
            {% endif %}
        </div>
    </aside>
    <div class="app-main">
